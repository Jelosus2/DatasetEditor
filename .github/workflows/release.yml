name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.2.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux packages
        run: pnpm package:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist_electron/linux/*.AppImage
            dist_electron/linux/*.deb
            dist_electron/linux/*.rpm
            dist_electron/linux/latest*.yml
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      EMBEDDED_PYTHON_URL: ${{ vars.EMBEDDED_PYTHON_URL  }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download embedded python bundle
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:EMBEDDED_PYTHON_URL)) {
            throw "Repository variable EMBEDDED_PYTHON_URL is not set."
          }

          $zipPath = Join-Path $env:RUNNER_TEMP "embedded_python.zip"

          Invoke-WebRequest `
            -Uri $env:EMBEDDED_PYTHON_URL `
            -OutFile $zipPath

          Expand-Archive -Path $zipPath -DestinationPath ${{ github.workspace }} -Force

          if (!(Test-Path "${{ github.workspace }}\\embedded_python\\python.exe")) {
            throw "embedded_python/python.exe not found after extraction."
          }

      - name: Build Windows packages
        run: pnpm package:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist_electron/win/*.exe
            dist_electron/win/*.zip
            dist_electron/win/latest*.yml
            dist_electron/win/*.blockmap
          if-no-files-found: error

  prepare-release-assets:
    name: Prepare Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    if: ${{ always() && needs.build-linux.result == 'success' && needs.build-windows.result == 'success' }}

    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-assets/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-assets/win

      - name: Upload merged release payload
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare-release-assets
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download prepared release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Prepare custom release notes
        id: notes
        shell: bash
        run: |
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_FILE=".github/release-notes/${TAG_NAME}.md"
          OUTPUT_FILE="$RUNNER_TEMP/release-notes.md"

          if [ -f "$TAG_FILE" ]; then
            cp "$TAG_FILE" "$OUTPUT_FILE"
          else
            : > "$OUTPUT_FILE"
          fi

          echo "path=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            release-assets/win/*.exe
            release-assets/win/*.zip
            release-assets/win/latest*.yml
            release-assets/win/*.blockmap
            release-assets/linux/*.AppImage
            release-assets/linux/*.deb
            release-assets/linux/*.rpm
            release-assets/linux/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
