appId: "com.jelosus1.dataset-editor"
productName: "Dataset Editor"
directories:
  output: "dist_electron/${os}"
files:
  - "dist/**/*"
  - "dist_app/**/*"
publish:
  - provider: "github"
    owner: "Jelosus2"
    repo: "DatasetEditor"
extraResources:
  - from: "tagger"
    to: "tagger"
    filter:
      - "**/*"
      - "!**/embedded_python/*"
      - "!**/__pycache__/*"

  - from: "build/danbooru.csv"
    to: "seed-data/danbooru.csv"
win:
  artifactName: "Dataset-Editor-${version}-${os}-${arch}.${ext}"
  icon: "public/doro.ico"
  target:
    - "nsis"
    - "zip"
  extraResources:
    - from: "embedded_python"
      to: "tagger/embedded_python"
      filter:
        - "**/*"
linux:
  artifactName: "Dataset-Editor-${version}-${arch}.${ext}"
  icon: "build/doro.png"
  category: "Utility"
  asarUnpack:
    - "**/node_modules/@img/**/*"
  target:
    - "deb"
    - "rpm"
    - "appimage"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "Dataset-Editor-Setup-${version}-${arch}.${ext}"
  installerIcon: "build/yes_doro.ico"
  uninstallerIcon: "build/no_doro.ico"
  include: "build/installer.nsh"
